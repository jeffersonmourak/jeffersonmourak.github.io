llmsIntro = "Jefferson Oliveira — engenheiro de software brasileiro com mais de 10 anos de experiência. Atuou em sistemas de gestão de tempo e infraestrutura de dados em tempo real para jogos com milhões de jogadores simultâneos. Escreve sobre tópicos de baixo nível e sistemas: compiladores, design de linguagens de programação, WebAssembly, DSLs, renderização de fontes, Unicode, representação binária, portas lógicas e simulação de circuitos digitais. Criador do Circ (uma linguagem para construir e simular circuitos digitais) e do Voting Poker (uma ferramenta gratuita de Planning Poker para estimativa de histórias). Também curte jogos de tabuleiro, astronomia e física."
