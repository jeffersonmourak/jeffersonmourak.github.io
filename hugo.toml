llmsIntro = "Jefferson Oliveira — software engineer from Brazil with 10+ years of experience. Background spans time-management systems and real-time data infrastructure serving millions of concurrent players in shipped games. Writes about low-level and systems topics: compilers, programming language design, WebAssembly, DSLs, font rendering, Unicode, binary representations, logic gates, and digital circuit simulation. Creator of Circ (a language for building and simulating digital circuits) and Voting Poker (a free Planning Poker tool for story estimation). Also into board games, astronomy, and physics."
